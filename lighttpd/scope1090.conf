server.modules += ( "mod_alias", "mod_proxy", "mod_rewrite" )

# Proxy /scope1090/api/* → Flask (strip /scope1090 prefix)
$HTTP["url"] =~ "^/scope1090/api/" {
    url.rewrite-once = ( "^/scope1090(/api/.*)$" => "$1" )
    proxy.server    = ( "" => ( ( "host" => "127.0.0.1", "port" => 5000 ) ) )
    proxy.forwarded = ( "for" => 1 )
}

# Serve static frontend under /scope1090/
alias.url += ( "/scope1090/" => "/usr/share/scope1090/html/" )

# SPA fallback: non-file requests → index.html
$HTTP["url"] =~ "^/scope1090/" {
    url.rewrite-if-not-file = ( "^(/scope1090/.*)$" => "/scope1090/index.html" )
}
