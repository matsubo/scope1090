server {
    listen 80;

    location /scope1090/api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    location /scope1090/ {
        alias /usr/share/scope1090/html/;
        try_files $uri $uri/ /scope1090/index.html;
    }
}
