<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>scope1090</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #1a1a1e; color: #e4e4e7; font-family: system-ui, sans-serif; }
        header { padding: 10px 16px; border-bottom: 1px solid #2e2e33; display: flex; align-items: center; gap: 12px; }
        h1 { font-size: 1rem; font-weight: 600; letter-spacing: 0.06em; color: #a1a1aa; }
        #controls { display: flex; gap: 6px; }
        .btn { background: #27272a; border: 1px solid #3f3f46; color: #e4e4e7; padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .btn:hover { background: #3f3f46; }
        .btn.active { background: #3b82f6; border-color: #3b82f6; }
        #charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(560px, 1fr)); gap: 12px; padding: 12px; }
        .chart { height: 260px; background: #27272a; border: 1px solid #2e2e33; border-radius: 6px; }
    </style>
</head>
<body>
    <header>
        <h1>scope1090</h1>
        <div id="controls"></div>
    </header>
    <main id="charts">
        <div id="chart-aircraft"      class="chart"></div>
        <div id="chart-messages_rate" class="chart"></div>
        <div id="chart-max_range"     class="chart"></div>
        <div id="chart-signal_mean"   class="chart"></div>
        <div id="chart-signal_peak"   class="chart"></div>
        <div id="chart-tracks_total"  class="chart"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
